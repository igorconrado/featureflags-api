spring:
  datasource:
    url: jdbc:h2:mem:testdb;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;NON_KEYWORDS=KEY
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    show-sql: false
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        globally_quoted_identifiers: true

  flyway:
    locations: classpath:db/testmigration
    baseline-on-migrate: true

security:
  jwt:
    secret: test-secret-key-that-is-at-least-32-characters-long
    expiration: 86400000
